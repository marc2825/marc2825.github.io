<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page.title">ポートフォリオテンプレート</title>
    <meta
      name="description"
      content="GitHub Pages向けのポートフォリオ雛形テンプレート"
      data-i18n-content="page.description"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <div class="header-top">
          <h1 class="site-title">Your Name</h1>
          <div
            class="lang-switch"
            role="group"
            aria-label="言語切り替え"
            data-i18n-aria-label="language.aria"
          >
            <button
              class="lang-button is-active"
              type="button"
              data-lang="ja"
              aria-pressed="true"
            >
              JP
            </button>
            <button class="lang-button" type="button" data-lang="en" aria-pressed="false">
              EN
            </button>
          </div>
        </div>
        <nav class="top-nav" aria-label="セクション切り替え" data-i18n-aria-label="nav.aria">
          <ul class="tab-list" role="tablist">
            <li>
              <button
                id="tab-about"
                class="tab-button is-active"
                type="button"
                role="tab"
                aria-controls="panel-about"
                aria-selected="true"
                data-panel="about"
              >
                <span data-i18n="nav.about">自己紹介</span>
              </button>
            </li>
            <li>
              <button
                id="tab-skills"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-skills"
                aria-selected="false"
                data-panel="skills"
              >
                <span data-i18n="nav.skills">スキル</span>
              </button>
            </li>
            <li>
              <button
                id="tab-projects"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-projects"
                aria-selected="false"
                data-panel="projects"
              >
                <span data-i18n="nav.projects">プロジェクト</span>
              </button>
            </li>
            <li>
              <button
                id="tab-articles"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-articles"
                aria-selected="false"
                data-panel="articles"
              >
                <span data-i18n="nav.articles">記事</span>
              </button>
            </li>
            <li>
              <button
                id="tab-news"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-news"
                aria-selected="false"
                data-panel="news"
              >
                <span data-i18n="nav.news">お知らせ</span>
              </button>
            </li>
            <li>
              <button
                id="tab-publications"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-publications"
                aria-selected="false"
                data-panel="publications"
              >
                <span data-i18n="nav.publications">出版・発表</span>
              </button>
            </li>
            <li>
              <button
                id="tab-contact"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-contact"
                aria-selected="false"
                data-panel="contact"
              >
                <span data-i18n="nav.contact">連絡先</span>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container section-wrap">
      <section
        id="panel-about"
        class="panel is-active"
        role="tabpanel"
        aria-labelledby="tab-about"
        data-panel="about"
      >
        <h2 data-i18n="section.about.title">自己紹介</h2>
        <div class="card-grid card-grid-3">
          <article class="card">
            <h3 data-i18n="section.about.intro.title">自己紹介</h3>
            <div
              class="editable-block"
              data-placeholder="ここに自己紹介を入力"
              data-i18n-placeholder="placeholder.about.intro"
            ></div>
          </article>
          <article class="card">
            <h3 data-i18n="section.about.history.title">経歴</h3>
            <div
              class="editable-block"
              data-placeholder="ここに経歴を入力"
              data-i18n-placeholder="placeholder.about.history"
            ></div>
          </article>
          <article class="card">
            <h3 data-i18n="section.about.affiliation.title">所属</h3>
            <div
              class="editable-block"
              data-placeholder="ここに所属を入力"
              data-i18n-placeholder="placeholder.about.affiliation"
            ></div>
          </article>
        </div>
      </section>

      <section
        id="panel-skills"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-skills"
        data-panel="skills"
        hidden
      >
        <h2 data-i18n="section.skills.title">スキル</h2>
        <div class="card-grid card-grid-2">
          <article class="card">
            <h3 data-i18n="section.skills.certifications.title">資格</h3>
            <ul
              class="editable-list"
              data-placeholder="資格を箇条書きで入力"
              data-i18n-placeholder="placeholder.skills.certifications"
            ></ul>
          </article>
          <article class="card">
            <h3 data-i18n="section.skills.languages.title">扱える言語</h3>
            <ul
              class="editable-list"
              data-placeholder="例: JavaScript / Python"
              data-i18n-placeholder="placeholder.skills.languages"
            ></ul>
          </article>
          <article class="card">
            <h3 data-i18n="section.skills.tools.title">ツール</h3>
            <ul
              class="editable-list"
              data-placeholder="例: Git / Docker / Figma"
              data-i18n-placeholder="placeholder.skills.tools"
            ></ul>
          </article>
          <article class="card">
            <h3 data-i18n="section.skills.frameworks.title">フレームワーク</h3>
            <ul
              class="editable-list"
              data-placeholder="例: React / Next.js"
              data-i18n-placeholder="placeholder.skills.frameworks"
            ></ul>
          </article>
        </div>
      </section>

      <section
        id="panel-projects"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-projects"
        data-panel="projects"
        hidden
      >
        <h2 data-i18n="section.projects.title">プロジェクト</h2>
        <div class="stack">
          <article class="card project-card">
            <div
              class="project-screenshot"
              data-placeholder="スクリーンショット"
              data-i18n-placeholder="placeholder.projects.screenshot"
            ></div>
            <div class="project-meta">
              <h3
                class="editable-line"
                data-placeholder="プロジェクト名"
                data-i18n-placeholder="placeholder.projects.name"
              ></h3>
              <p
                class="editable-block"
                data-placeholder="プロジェクトの概要"
                data-i18n-placeholder="placeholder.projects.summary"
              ></p>
              <p
                class="editable-line"
                data-placeholder="リポジトリURL"
                data-i18n-placeholder="placeholder.projects.repo"
              ></p>
              <p
                class="editable-line"
                data-placeholder="使用技術"
                data-i18n-placeholder="placeholder.projects.tech"
              ></p>
            </div>
          </article>
          <article class="card project-card">
            <div
              class="project-screenshot"
              data-placeholder="スクリーンショット"
              data-i18n-placeholder="placeholder.projects.screenshot"
            ></div>
            <div class="project-meta">
              <h3
                class="editable-line"
                data-placeholder="プロジェクト名"
                data-i18n-placeholder="placeholder.projects.name"
              ></h3>
              <p
                class="editable-block"
                data-placeholder="プロジェクトの概要"
                data-i18n-placeholder="placeholder.projects.summary"
              ></p>
              <p
                class="editable-line"
                data-placeholder="リポジトリURL"
                data-i18n-placeholder="placeholder.projects.repo"
              ></p>
              <p
                class="editable-line"
                data-placeholder="使用技術"
                data-i18n-placeholder="placeholder.projects.tech"
              ></p>
            </div>
          </article>
        </div>
      </section>

      <section
        id="panel-articles"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-articles"
        data-panel="articles"
        hidden
      >
        <h2 data-i18n="section.articles.title">記事</h2>
        <div class="card">
          <ul
            class="editable-list"
            data-placeholder="記事タイトルやURLを追加"
            data-i18n-placeholder="placeholder.articles.list"
          ></ul>
        </div>
      </section>

      <section
        id="panel-publications"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-publications"
        data-panel="publications"
        hidden
      >
        <h2 data-i18n="section.publications.title">出版・発表</h2>
        <div class="card-grid card-grid-2">
          <article class="card">
            <h3 data-i18n="section.publications.papers.title">論文リスト</h3>
            <ul
              class="editable-list"
              data-placeholder="論文タイトルやDOIを追加"
              data-i18n-placeholder="placeholder.publications.papers"
            ></ul>
          </article>
          <article class="card">
            <h3 data-i18n="section.publications.talks.title">登壇履歴</h3>
            <ul
              class="editable-list"
              data-placeholder="イベント名や発表タイトルを追加"
              data-i18n-placeholder="placeholder.publications.talks"
            ></ul>
          </article>
        </div>
      </section>

      <section
        id="panel-news"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-news"
        data-panel="news"
        hidden
      >
        <h2 data-i18n="section.news.title">お知らせ</h2>
        <article class="card">
          <div class="news-list">
            <div class="news-item">
              <p
                class="editable-line news-date"
                data-placeholder="年/月"
                data-i18n-placeholder="placeholder.news.date"
              ></p>
              <p
                class="editable-line news-event"
                data-placeholder="出来事"
                data-i18n-placeholder="placeholder.news.event"
              ></p>
            </div>
            <div class="news-item">
              <p
                class="editable-line news-date"
                data-placeholder="年/月"
                data-i18n-placeholder="placeholder.news.date"
              ></p>
              <p
                class="editable-line news-event"
                data-placeholder="出来事"
                data-i18n-placeholder="placeholder.news.event"
              ></p>
            </div>
            <div class="news-item">
              <p
                class="editable-line news-date"
                data-placeholder="年/月"
                data-i18n-placeholder="placeholder.news.date"
              ></p>
              <p
                class="editable-line news-event"
                data-placeholder="出来事"
                data-i18n-placeholder="placeholder.news.event"
              ></p>
            </div>
          </div>
        </article>
      </section>

      <section
        id="panel-contact"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-contact"
        data-panel="contact"
        hidden
      >
        <h2 data-i18n="section.contact.title">連絡先</h2>
        <div class="card-grid card-grid-2">
          <article class="card">
            <h3 data-i18n="section.contact.email.title">メール</h3>
            <p
              class="editable-line"
              data-placeholder="メールアドレス"
              data-i18n-placeholder="placeholder.contact.email"
            ></p>
          </article>
          <article class="card">
            <h3 data-i18n="section.contact.sns.title">SNS</h3>
            <ul
              class="editable-list"
              data-placeholder="SNS名とURLを追加"
              data-i18n-placeholder="placeholder.contact.sns"
            ></ul>
          </article>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
