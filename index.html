<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Template</title>
    <meta
      name="description"
      content="GitHub Pages向けのポートフォリオ雛形テンプレート"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <h1 class="site-title">Your Name</h1>
        <nav class="top-nav" aria-label="セクション切り替え">
          <ul class="tab-list" role="tablist">
            <li>
              <button
                id="tab-about"
                class="tab-button is-active"
                type="button"
                role="tab"
                aria-controls="panel-about"
                aria-selected="true"
                data-panel="about"
              >
                About Me
              </button>
            </li>
            <li>
              <button
                id="tab-skills"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-skills"
                aria-selected="false"
                data-panel="skills"
              >
                Skills
              </button>
            </li>
            <li>
              <button
                id="tab-projects"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-projects"
                aria-selected="false"
                data-panel="projects"
              >
                Projects / Works
              </button>
            </li>
            <li>
              <button
                id="tab-articles"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-articles"
                aria-selected="false"
                data-panel="articles"
              >
                Articles
              </button>
            </li>
            <li>
              <button
                id="tab-news"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-news"
                aria-selected="false"
                data-panel="news"
              >
                News
              </button>
            </li>
            <li>
              <button
                id="tab-publications"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-publications"
                aria-selected="false"
                data-panel="publications"
              >
                Publications
              </button>
            </li>
            <li>
              <button
                id="tab-contact"
                class="tab-button"
                type="button"
                role="tab"
                aria-controls="panel-contact"
                aria-selected="false"
                data-panel="contact"
              >
                Contact
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container section-wrap">
      <section
        id="panel-about"
        class="panel is-active"
        role="tabpanel"
        aria-labelledby="tab-about"
        data-panel="about"
      >
        <h2>About Me</h2>
        <div class="card-grid card-grid-3">
          <article class="card">
            <h3>自己紹介</h3>
            <div class="editable-block" data-placeholder="ここに自己紹介を入力"></div>
          </article>
          <article class="card">
            <h3>経歴</h3>
            <div class="editable-block" data-placeholder="ここに経歴を入力"></div>
          </article>
          <article class="card">
            <h3>所属</h3>
            <div class="editable-block" data-placeholder="ここに所属を入力"></div>
          </article>
        </div>
      </section>

      <section
        id="panel-skills"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-skills"
        data-panel="skills"
        hidden
      >
        <h2>Skills</h2>
        <div class="card-grid card-grid-2">
          <article class="card">
            <h3>資格</h3>
            <ul class="editable-list" data-placeholder="資格を箇条書きで入力"></ul>
          </article>
          <article class="card">
            <h3>扱える言語</h3>
            <ul class="editable-list" data-placeholder="例: JavaScript / Python"></ul>
          </article>
          <article class="card">
            <h3>ツール</h3>
            <ul class="editable-list" data-placeholder="例: Git / Docker / Figma"></ul>
          </article>
          <article class="card">
            <h3>フレームワーク</h3>
            <ul class="editable-list" data-placeholder="例: React / Next.js"></ul>
          </article>
        </div>
      </section>

      <section
        id="panel-projects"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-projects"
        data-panel="projects"
        hidden
      >
        <h2>Projects / Works</h2>
        <div class="stack">
          <article class="card project-card">
            <div class="project-screenshot" data-placeholder="スクリーンショット"></div>
            <div class="project-meta">
              <h3 class="editable-line" data-placeholder="プロジェクト名"></h3>
              <p class="editable-block" data-placeholder="プロジェクトの概要"></p>
              <p class="editable-line" data-placeholder="リポジトリURL"></p>
              <p class="editable-line" data-placeholder="使用技術"></p>
            </div>
          </article>
          <article class="card project-card">
            <div class="project-screenshot" data-placeholder="スクリーンショット"></div>
            <div class="project-meta">
              <h3 class="editable-line" data-placeholder="プロジェクト名"></h3>
              <p class="editable-block" data-placeholder="プロジェクトの概要"></p>
              <p class="editable-line" data-placeholder="リポジトリURL"></p>
              <p class="editable-line" data-placeholder="使用技術"></p>
            </div>
          </article>
        </div>
      </section>

      <section
        id="panel-articles"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-articles"
        data-panel="articles"
        hidden
      >
        <h2>Articles</h2>
        <div class="card">
          <ul class="editable-list" data-placeholder="記事タイトルやURLを追加"></ul>
        </div>
      </section>

      <section
        id="panel-publications"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-publications"
        data-panel="publications"
        hidden
      >
        <h2>Publications</h2>
        <div class="card-grid card-grid-2">
          <article class="card">
            <h3>論文リスト</h3>
            <ul class="editable-list" data-placeholder="論文タイトルやDOIを追加"></ul>
          </article>
          <article class="card">
            <h3>登壇履歴</h3>
            <ul class="editable-list" data-placeholder="イベント名や発表タイトルを追加"></ul>
          </article>
        </div>
      </section>

      <section
        id="panel-news"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-news"
        data-panel="news"
        hidden
      >
        <h2>News</h2>
        <article class="card">
          <div class="news-list">
            <div class="news-item">
              <p class="editable-line news-date" data-placeholder="年/月"></p>
              <p class="editable-line news-event" data-placeholder="出来事"></p>
            </div>
            <div class="news-item">
              <p class="editable-line news-date" data-placeholder="年/月"></p>
              <p class="editable-line news-event" data-placeholder="出来事"></p>
            </div>
            <div class="news-item">
              <p class="editable-line news-date" data-placeholder="年/月"></p>
              <p class="editable-line news-event" data-placeholder="出来事"></p>
            </div>
          </div>
        </article>
      </section>

      <section
        id="panel-contact"
        class="panel"
        role="tabpanel"
        aria-labelledby="tab-contact"
        data-panel="contact"
        hidden
      >
        <h2>Contact</h2>
        <div class="card-grid card-grid-2">
          <article class="card">
            <h3>Email</h3>
            <p class="editable-line" data-placeholder="メールアドレス"></p>
          </article>
          <article class="card">
            <h3>SNS</h3>
            <ul class="editable-list" data-placeholder="SNS名とURLを追加"></ul>
          </article>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
