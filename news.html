<!DOCTYPE html>
<html lang="ja" data-theme="dark">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css" />

      <div class="nav-right">
        <button class="theme-toggle" id="themeToggle" aria-label="テーマ切り替え">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 12c0 5.385 4.365 9.75 9.75 9.75 4.371 0 8.083-2.88 9.002-6.998Z"/>

          <span class="lang-sep">|</span>
          <button class="lang-btn active" data-lang="ja">JP</button>
        </div>
      </div>
    </div>
  </nav>

  <section class="section subpage-section">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-number">08</span>
        <h2 class="section-title" data-i18n="news.title">お知らせ</h2>
      </div>
      <ul class="news-list" id="newsList"></ul>
    </div>
  </section>

  <footer id="footer">
    <div class="container">
      <p id="footerName"></p>
      <p class="footer-copy">&copy; <span id="footerYear"></span></p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="core.js"></script>
  <script src="page.js"></script>
  <script>initSubPage("news");</script>

</html>
